# ─────────────────────────────────────────────────────────────
#  liard.me — thème « Terminal »
# ─────────────────────────────────────────────────────────────
title: Samuel Liard
description: "Software Engineering Manager — blog technique, talks & CV."
author: Samuel Liard
email: samuel@liard.me
url: "https://liard.me"
lang: fr

# URLs identiques à l'ancien site (ex. /2026/03/copilot-cli-online/)
permalink: /:year/:month/:title/

markdown: kramdown
highlighter: rouge
sass:
  style: compressed

# Liens sociaux (utilisés dans le footer / le CV)
social:
  github: sliard
  linkedin: samuelliard
  stackoverflow: 256996/samuel

plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Layout par défaut des articles (le thème Terminal n'utilise plus minima)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
